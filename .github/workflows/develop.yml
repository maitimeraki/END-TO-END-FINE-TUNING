name: Fine Tuning Pipeline

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

env:
    DOCKER_IMAGE: ghcr.io/anupam/fine-tuner-unsloth
    PYTHON_VERSION: "3.12"
    CPU_CORES: "{all}"

jobs:
    develop:
        runs-on: ubuntu-latest

        steps:
        - uses: actions/checkout@v4

        - name: Setup Python
          uses: actions/setup-python@v5
          with:
            python-version: ${{ env.PYTHON_VERSION }}

        - name: Upgrade pip and install dependencies
          run: |
            pip install --upgrade pip
            pip install -r requirements.txt
            pip install -e .[dev]

        - name: Build Docker image
          run: docker build -t "$DOCKER_IMAGE:${{ github.sha }}" ./

        - name: Run local tests
          if: startsWith(github.ref, 'refs/heads/main')
          run: |
            python -m pytest --collect-only

    deploy:
        needs: develop
        runs-on: ubuntu-latest
        environment: production

        steps:
        - uses: actions/checkout@v4

        - name: Build Docker image for production
          run: docker build -t "$DOCKER_IMAGE" ./

        - name: Deploy to container registry
          if: startsWith(github.ref, 'refs/heads/main')
          run: |
            echo "docker tag $DOCKER_IMAGE:${{ github.sha }} ghcr.io/anupam/fine-tuner-unsloth:${{ github.sha }}"

        - name: Push image to GitHub Container Registry
          uses: docker/login-action@v3
          with:
            registry: ghcr.io
            user: ${{ github.actor }}
            password: ${{ secrets.GITHUB_TOKEN }}

        - name: Deploy to GitHub Actions container runner
          run: |
            echo "CI/CD Pipeline completed successfully"

    linting:
        runs-on: ubuntu-latest

        steps:
        - uses: actions/checkout@v4

        - name: Check code format
          run: |
            pip install black ruff flake8 mypy mypy
            black . --check && ruff check .

    unit-tests:
        runs-on: ubuntu-latest

        steps:
        - uses: actions/checkout@v4

        - name: Setup Python
          uses: actions/setup-python@v5
          with:
            python-version: ${{ env.PYTHON_VERSION }}

        - name: Install dependencies
          run: |
            pip install -r requirements.txt
            pip install pytest

        - name: Run unit tests
          run: |
            pytest . --cov=. --cov-report=xml && echo "Tests passed"